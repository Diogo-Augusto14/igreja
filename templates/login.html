{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Painel</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
    <div class="login-card">
        <h2>Login do Painel</h2>
        <p>Entre com suas credenciais para acessar a administração.</p>

        <form method="post" class="login-form">
            {% csrf_token %}

            {% if form.errors %}
                <ul class="errorlist">
                    <li>Usuário ou senha inválidos.</li>
                </ul>
            {% endif %}

            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Usuário</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Senha</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn-primary">Entrar</button>
        </form>
    </div>
</body>
</html>
